name: Scheduled Data Collection

on:
  schedule:
    # Run every 4 hours at 1 minute past (after 4H candle close)
    # 00:01, 04:01, 08:01, 12:01, 16:01, 20:01 UTC
    - cron: '1 0,4,8,12,16,20 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  collect:
    # Use self-hosted runner (required for Binance API access from allowed regions)
    # To set up: Repository Settings > Actions > Runners > New self-hosted runner
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Create data directory
        run: mkdir -p data logs

      - name: Install dependencies
        run: uv sync

      - name: Run data collection
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ENABLED: "true"
        run: uv run python -m perpetual_predict daemon --run-once

      - name: Upload health status
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-health-status
          path: data/scheduler_status.json
          retention-days: 7
          overwrite: true
        if: always()
